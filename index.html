<script>
// Generate favicon dynamically
(function(){
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');
  // Rounded rect background
  const r = 12;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(64-r,0);
  ctx.quadraticCurveTo(64,0,64,r);
  ctx.lineTo(64,64-r); ctx.quadraticCurveTo(64,64,64-r,64);
  ctx.lineTo(r,64); ctx.quadraticCurveTo(0,64,0,64-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0,0,64,64);
  grad.addColorStop(0,'#e07b39'); grad.addColorStop(1,'#d45f20');
  ctx.fillStyle = grad; ctx.fill();
  // AG text
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 28px -apple-system, Arial, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('AG', 32, 26);
  // HUBS text
  ctx.font = 'bold 13px -apple-system, Arial, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.letterSpacing = '2px';
  ctx.fillText('HUBS', 32, 47);
  const link = document.createElement('link');
  link.rel = 'icon'; link.type = 'image/png';
  link.href = c.toDataURL('image/png');
  document.head.appendChild(link);
  // Also Apple touch icon
  const touch = document.createElement('link');
  touch.rel = 'apple-touch-icon';
  touch.href = c.toDataURL('image/png');
  document.head.appendChild(touch);
})();
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0a0e1a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; overscroll-behavior: none; }

    box-shadow: 0 4px 24px #00000088;
    position: relative;

  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .header-icon {
    width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0;
    background: linear-gradient(135deg, #e07b39, #d45f20);

  .header-icon .logo-ag { font-size: 16px; font-weight: 900; color: #fff; letter-spacing: -0.5px; line-height: 1; }
  .header-icon .logo-hubs { font-size: 8px; font-weight: 700; color: #ffffffcc; letter-spacing: 1.5px; line-height: 1; margin-top: 2px; }
  .header-title { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; color: #f1f5f9; }
  .header-sub { font-size: 10px; color: #64748b; letter-spacing: 0.8px; margin-top: 1px; }

  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 8px; }
  .search-wrap .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #475569; font-size: 14px; pointer-events: none; }
  #searchInput {
    width: 100%; background: #0f172a; border: 1px solid #334155;
    border-radius: 8px; padding: 9px 34px 9px 32px;
    font-size: 13px; color: #f1f5f9; outline: none;
    -webkit-appearance: none; appearance: none;
    transition: border-color 0.15s;
  }
  #searchInput:focus { border-color: #e07b39; }
  #clearBtn {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #64748b; font-size: 16px;
    cursor: pointer; display: none; padding: 4px;
  }

  /* FILTERS */
  .filters { display: flex; gap: 6px; align-items: center; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    padding: 4px 11px; border-radius: 6px; border: 1px solid #334155;
    background: transparent; color: #64748b; font-size: 11px; font-weight: 600;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    -webkit-appearance: none; transition: all 0.15s;
  }
  .filter-btn.active-all { border-color: #e07b39; background: #e07b3922; color: #e07b39; }
  .filter-btn.active-4  { border-color: #e07b39; background: #e07b3922; color: #e07b39; }
  .filter-btn.active-5  { border-color: #3b82f6; background: #3b82f622; color: #3b82f6; }
  .filter-btn.active-6  { border-color: #10b981; background: #10b98122; color: #10b981; }
  .filter-btn.active-8  { border-color: #a855f7; background: #a855f722; color: #a855f7; }
  .filter-btn.active-10 { border-color: #ef4444; background: #ef444422; color: #ef4444; }
  .result-count { margin-left: auto; font-size: 11px; color: #475569; flex-shrink: 0; white-space: nowrap; }

  /* SCROLL AREA */
  #results { flex: 1; overflow-y: auto; padding: 12px 12px 32px; -webkit-overflow-scrolling: touch; }

  /* HINT */
  .hint {
    font-size: 11px; color: #64748b; margin-bottom: 10px; padding: 7px 10px;
    background: #0f172a; border-radius: 6px; border: 1px solid #1e293b;
  }
  .hint span { color: #e07b39; font-family: monospace; }

  /* EMPTY */
  .empty { text-align: center; padding: 60px 20px; color: #475569; }
  .empty .icon { font-size: 36px; margin-bottom: 10px; }
  .empty .title { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
  .empty .sub { font-size: 12px; }
  .empty code { color: #e07b39; }

  /* HUB CARD */
  .card {
    border-radius: 10px; margin-bottom: 12px; overflow: hidden;
    background: linear-gradient(135deg, #1e2330 0%, #252b3b 100%);
    border: 1px solid transparent;
  }
  .card-header {
    display: flex; align-items: center; gap: 10px; padding: 11px 12px;
    cursor: pointer; user-select: none; -webkit-user-select: none;
  }
  .bolt-badge {
    border-radius: 7px; width: 38px; height: 38px; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .bolt-badge .num { font-size: 14px; font-weight: 800; color: #fff; line-height: 1; }
  .bolt-badge .lbl { font-size: 8px; color: #ffffffaa; font-weight: 600; letter-spacing: 1px; }
  .card-info { flex: 1; min-width: 0; }
  .card-ref { font-size: 16px; font-weight: 700; color: #f1f5f9; }
  .card-meta { font-size: 10px; color: #64748b; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-part { font-size: 10px; color: #94a3b8; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chevron { color: #475569; font-size: 12px; flex-shrink: 0; transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }

  .quick-pills { padding: 0 12px 6px; display: flex; flex-direction: column; gap: 5px; }

  .pill {
    background: #0f172a; border-radius: 6px; padding: 4px 8px;
    border: 1px solid #334155; font-size: 10.5px; color: #94a3b8;
    display: flex; align-items: center; gap: 4px; flex-wrap: wrap;

  .pill.accent { border-color: transparent; }
  .pill .lbl { font-weight: 700; font-size: 9px; letter-spacing: 0.4px; flex-shrink: 0; }
  .pill .val { color: #cbd5e1; font-family: monospace; font-weight: 600; }
  .pill .dim { color: #475569; }
  .pill .sep { color: #334155; }

  .seal-pill {
    background: #0f172a; border-radius: 6px; padding: 4px 8px;
    font-size: 10.5px; color: #94a3b8;
    display: flex; flex-direction: column; gap: 3px;
  }
  .seal-pill.accent { border: 1px solid transparent; }
  .seal-top { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .seal-bottom { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .seal-pill .lbl { font-weight: 700; font-size: 9px; letter-spacing: 0.4px; }
  .seal-pill .val { color: #cbd5e1; font-family: monospace; font-weight: 600; }
  .seal-pill .dim { color: #475569; }
  .seal-pill .sep { color: #334155; }

  .detail { border-top: 1px solid #1e293b; padding: 12px; display: none; }
  .detail.open { display: block; }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; }
  .detail-cell {
    background: #0f172a; border-radius: 6px; padding: 6px 8px;
    border: 1px solid #1e293b; display: flex; flex-direction: column; gap: 2px;
  }
  .detail-cell .lbl { font-size: 9px; color: #475569; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; }
  .detail-cell .val { font-size: 11px; color: #cbd5e1; font-family: monospace; word-break: break-all; }

  mark { background: #fde68a; border-radius: 2px; padding: 0 1px; color: #1a1a1a; }
</style>
</head>

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function highlight(text, q) {
  if (!q) return esc(text);
  try {
    const safe = q.replace(/[-[\]{}()*+?.,\\^$|#\s]/g, '\\$&');
    const re = new RegExp(`(${safe})`, 'gi');
    return esc(text).replace(re, '<mark>$1</mark>');
  } catch { return esc(text); }
}

function norm(str) { return String(str).toLowerCase().replace(/[\s\-]/g,''); }

function hubMatches(hub, q) {
  if (!q) return true;
  const n = norm(q);
  const bearingFields = [hub.innerCupPartNo, hub.innerCupDia, hub.outerCupPartNo, hub.outerCupDia,
    hub.innerConePartNo, hub.innerConeDia, hub.outerConePartNo, hub.outerConeDia];
  if (bearingFields.some(f => norm(f).includes(n))) return true;
  const general = [hub.hubRef, hub.hubPartNo, hub.hubAssemblyPartNo, hub.dustCapPartNo,
    hub.greaseSealPartNo, hub.spindlePartNo, hub.wheelBoltPartNo, hub.wheelStudPartNo,
    hub.wheelNutPartNo, String(hub.capacity), String(hub.boltCount)];
  if (general.some(f => f && norm(f).includes(n))) return true;
  const seal = SEAL_DATA[hub.greaseSealPartNo];
  if (seal && [seal.id, seal.od, seal.width, seal.ref].some(v => norm(v).includes(n))) return true;
  return false;
}

// ── Render ────────────────────────────────────────────────────────────────
function pill(label, value, dimExtra, color, q) {
  const border = color ? `border-color:${color}44` : '';
  const lblColor = color || '#64748b';
  return `<div class="pill accent" style="${border}">
    <span class="lbl" style="color:${lblColor}">${label}</span>
    <span class="val">${highlight(value, q)}</span>
    ${dimExtra ? `<span class="dim">${esc(dimExtra)}</span>` : ''}
  </div>`;
}

function renderCard(hub, q) {
  const color = BOLT_COLORS[hub.boltCount] || '#888';
  const isOpen = expanded.has(hub.hubPartNo);
  const seal = SEAL_DATA[hub.greaseSealPartNo];

  const bearings = [
    {label:'Inner Cup', pn: hub.innerCupPartNo, dia: hub.innerCupDia},
    {label:'Outer Cup', pn: hub.outerCupPartNo, dia: hub.outerCupDia},
    {label:'Inner Cone', pn: hub.innerConePartNo, dia: hub.innerConeDia},
    {label:'Outer Cone', pn: hub.outerConePartNo, dia: hub.outerConeDia},
  ];

  const detailRows = Object.entries(FIELD_LABELS).map(([k, label]) => {
    const val = hub[k];
    if (val === undefined || val === null) return '';
    return `<div class="detail-cell">
      <span class="lbl">${esc(label)}</span>
      <span class="val">${highlight(String(val), q)}</span>
    </div>`;
  }).join('');

  return `<div class="card" style="border-color:${color}33;box-shadow:0 3px 16px ${color}11" data-part="${esc(hub.hubPartNo)}">
    <div class="card-header" onclick="toggleCard('${esc(hub.hubPartNo)}')">
      <div class="bolt-badge" style="background:${color};box-shadow:0 0 10px ${color}55">
        <span class="num">${hub.boltCount}</span>
        <span class="lbl">BOLT</span>
      </div>
      <div class="card-info">
        <div class="card-ref">${highlight(hub.hubRef, q)}</div>
        <div class="card-meta" style="color:${color}">${esc(hub.boltCircle)} BC · ${esc(hub.pilot)} Pilot · ${hub.capacity.toLocaleString()} lb</div>
        <div class="card-part">${highlight(hub.hubPartNo, q)}</div>
      </div>
      <span class="chevron ${isOpen ? 'open' : ''}">▼</span>
    </div>

    <div class="quick-pills">
      <div class="pill-row">
        ${bearings.map(b => `<div class="pill">
          <span class="lbl" style="color:#64748b">${esc(b.label)}</span>
          <span class="val">${highlight(b.pn, q)}</span>
          <span class="dim">· ${highlight(b.dia, q)}</span>
        </div>`).join('')}
      </div>
      <div class="pill-row">
        <div class="pill accent" style="border-color:${color}44">
          <span class="lbl" style="color:${color}">SPINDLE</span>
          <span class="val">${highlight(hub.spindlePartNo, q)}</span>
          <span class="dim">· #${esc(hub.spindleNo)}</span>
          <span class="sep">·</span>
          <span class="dim">Types: ${esc(hub.spinnerTypes)}</span>
        </div>
        <div class="pill accent" style="border-color:${color}44">
          <span class="lbl" style="color:${color}">DUST CAP</span>
          <span class="val">${highlight(hub.dustCapPartNo, q)}</span>
        </div>
      </div>
      <div class="pill-row">
        <div class="seal-pill accent" style="border-color:${color}44">
          <div class="seal-top">
            <span class="lbl" style="color:${color}">GREASE SEAL</span>
            <span class="val">${highlight(hub.greaseSealPartNo, q)}</span>
            ${seal ? `<span class="sep">·</span><span class="dim">CR </span><span class="val">${esc(seal.ref)}</span>` : ''}
          </div>
          ${seal ? `<div class="seal-bottom">
            <span class="dim">ID </span><span class="val">${esc(seal.id)}</span>
            <span class="sep">·</span>
            <span class="dim">OD </span><span class="val">${esc(seal.od)}</span>
            <span class="sep">·</span>
            <span class="dim">W </span><span class="val">${esc(seal.width)}</span>
          </div>` : ''}
        </div>
      </div>
    </div>

    <div class="detail ${isOpen ? 'open' : ''}" id="detail-${esc(hub.hubPartNo).replace(/[^a-z0-9]/gi,'-')}">
      <div class="detail-grid">${detailRows}</div>
    </div>
  </div>`;
}

function render() {
  const filtered = hubData.filter(h => {
    if (boltFilter !== 'all' && h.boltCount !== Number(boltFilter)) return false;
    return hubMatches(h, query);
  });

  document.getElementById('resultCount').textContent = `${filtered.length} hub${filtered.length !== 1 ? 's' : ''}`;

  const hint = query
    ? `💡 Showing hubs matching <span>${esc(query)}</span> — tap any card to expand`
    : `💡 Search by bearing # (e.g. <span>LM-67048</span>), diameter, seal CR, or hub ref`;

  const html = filtered.length === 0
    ? `<div class="empty"><div class="icon">🔩</div><div class="title">No hubs found</div><div class="sub">Try a bearing like <code>LM-67048</code> or hub ref like <code>888</code></div></div>`
    : `<div class="hint">${hint}</div>` + filtered.map(h => renderCard(h, query)).join('');

  document.getElementById('results').innerHTML = html;
}

// ── Toggle card expand ────────────────────────────────────────────────────
function toggleCard(partNo) {
  if (expanded.has(partNo)) { expanded.delete(partNo); } else { expanded.add(partNo); }
  render();
}

// ── Event listeners ───────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function() {
  query = this.value;
  document.getElementById('clearBtn').style.display = query ? 'block' : 'none';
  render();
});

document.getElementById('clearBtn').addEventListener('click', function() {
  query = '';
  document.getElementById('searchInput').value = '';
  this.style.display = 'none';
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    const bolt = this.dataset.bolt;
    boltFilter = bolt;
    document.querySelectorAll('.filter-btn').forEach(b => {
      const bv = b.dataset.bolt;
      b.className = 'filter-btn' + (bv === bolt ? ` active-${bv}` : '');
    });
    render();
  });
});

// ── Init ──────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
